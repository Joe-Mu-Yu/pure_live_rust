name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: aarch64-linux-android
      
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmd-line-tools-version: 9.0
          platforms: android-34
          build-tools: 34.0.0
      
      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true
      
      - name: Install dependencies
        run: |
          npm ci
          rustup target add aarch64-linux-android
      
      - name: Build frontend
        run: npm run build
      
      - name: Build Android APK (Debug)
        run: cargo tauri android build
      
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pure-live-rust-android-debug
          path: src-tauri/target/aarch64-linux-android/debug/*.apk
          retention-days: 7
      
      - name: Build Android APK (Release)
        if: startsWith(github.ref, 'refs/tags/')
        run: cargo tauri android build --release
      
      - name: Upload Release APK
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: pure-live-rust-android-release
          path: src-tauri/target/aarch64-linux-android/release/*.apk
          retention-days: 30
